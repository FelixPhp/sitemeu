<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ART LIFE DEVELOPER - Em Breve</title>

<style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    body{
        width:100vw;
        height:100vh;
        background: linear-gradient(135deg, #050505, #0f172a, #000000);
        display:flex;
        align-items:center;
        justify-content:center;
        overflow:hidden;
        color:white;
    }

    .login-btn{
    position:absolute;
    top:25px;
    right:40px;
    padding:10px 22px;
    border-radius:30px;
    border:none;
    cursor:pointer;
    font-weight:600;
    font-size:14px;
    letter-spacing:1px;
    background: linear-gradient(90deg, #00f5ff, #22d3ee);
    color:#0f172a;
    transition:0.3s ease;
    box-shadow: 0 0 15px rgba(34,211,238,0.4);
}

.login-btn:hover{
    transform: translateY(-3px);
    box-shadow: 0 0 25px rgba(34,211,238,0.8);
}

    .container{
        text-align:center;
        padding:40px;
        background: rgba(0,0,0,0.55);
        border-radius:20px;
        backdrop-filter: blur(10px);
        box-shadow: 0 0 40px rgba(0,255,255,0.15);
        animation: fadeIn 2s ease;
        max-width:700px;
        width:90%;
    }

    .logo{
        font-size:48px;
        font-weight:900;
        letter-spacing:4px;
        background: linear-gradient(90deg, #00f5ff, #38bdf8, #22d3ee);
        -webkit-background-clip:text;
        -webkit-text-fill-color: transparent;
        margin-bottom:15px;
        animation: glow 2s infinite alternate;
    }

    .subtitle{
        font-size:20px;
        margin-bottom:30px;
        color:#cbd5e1;
    }

    .typing{
        font-size:22px;
        margin-bottom:30px;
        height:28px;
        color:#22d3ee;
    }

    .progress{
        width:100%;
        height:10px;
        background:#0f172a;
        border-radius:20px;
        overflow:hidden;
        margin-top:25px;
    }

    .bar{
        height:100%;
        width:0%;
        background: linear-gradient(90deg, #00f5ff, #22d3ee, #38bdf8);
        animation: loading 8s infinite;
    }

    .footer{
        margin-top:25px;
        font-size:14px;
        color:#94a3b8;
    }

    @keyframes fadeIn{
        from{opacity:0; transform: translateY(30px);} 
        to{opacity:1; transform: translateY(0);} 
    }

    @keyframes glow{
        from{ text-shadow: 0 0 10px #00f5ff; }
        to{ text-shadow: 0 0 25px #22d3ee; }
    }

    @keyframes loading{
        0%{width:0%;}
        50%{width:70%;}
        100%{width:100%;}
    }

    .bg-anim{
        position:absolute;
        width:100%;
        height:100%;
        top:0;
        left:0;
        z-index:-1;
        overflow:hidden;
    }

    .circle{
        position:absolute;
        border-radius:50%;
        background: rgba(34,211,238,0.15);
        animation: float 12s infinite linear;
    }

    @keyframes float{
        0%{transform: translateY(0) translateX(0);} 
        50%{transform: translateY(-60px) translateX(40px);} 
        100%{transform: translateY(0) translateX(0);} 
    }
</style>
</head>
<body>
    <a href="Syteamgelp/index.php" class="login-btn">Dev</a>

<div class="bg-anim" id="bg"></div>

<div class="container">
    <div class="logo">ART LIFE DEVELOPER</div>
    <div class="subtitle">Nova experiência digital em construção</div>
    <div class="typing" id="typing"></div>

    <div class="progress">
        <div class="bar"></div>
    </div>

    <div class="footer">© 2026 - ART LIFE DEVELOPER • Tecnologia, Inovação e Performance</div>
</div>

<script>
    // Efeito de digitação
    const texts = [
        "Em breve, algo incrível.",
        "Desenvolvimento de sistemas inteligentes.",
        "Soluções digitais sob medida.",
        "Infraestrutura • Software • Inovação"
    ];

    let index = 0;
    let char = 0;
    let currentText = "";
    let isDeleting = false;
    const typingElement = document.getElementById('typing');

    function typeEffect(){
        if(index >= texts.length) index = 0;
        currentText = texts[index];

        if(!isDeleting){
            typingElement.innerHTML = currentText.substring(0, char++);
            if(char === currentText.length + 1){
                isDeleting = true;
                setTimeout(()=>{}, 1000);
            }
        }else{
            typingElement.innerHTML = currentText.substring(0, char--);
            if(char === 0){
                isDeleting = false;
                index++;
            }
        }
        setTimeout(typeEffect, isDeleting ? 50 : 90);
    }

    typeEffect();

    // Animação de fundo
    const bg = document.getElementById('bg');

    for(let i=0;i<20;i++){
        const circle = document.createElement('div');
        circle.classList.add('circle');
        const size = Math.random()*120 + 40;
        circle.style.width = size + 'px';
        circle.style.height = size + 'px';
        circle.style.top = Math.random()*100 + '%';
        circle.style.left = Math.random()*100 + '%';
        circle.style.animationDuration = (Math.random()*10 + 6) + 's';
        bg.appendChild(circle);
    }
</script>

</body>
</html>
